  <!-- Ако предпочиташ да НЕ пипаш style.css, сложи CSS-а от т.1 тук -->
  <style>
    :root{
      --c-green:#6aa84f; --c-yellow:#ffd966; --c-red:#ff0000; --c-orange:#f6b26b;
      --cell-gray:#5f5f5f;
    }
    .codes-wrap{display:grid;grid-template-columns:1fr 1fr .9fr;gap:14px}
    .codes-table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.15)}
    .codes-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px}
    .codes-table tr:last-child td{border-bottom:0}
    td.code{width:90px;font-weight:800;color:#000;text-align:center;white-space:nowrap}
    td.desc{background:var(--cell-gray);color:#fff;font-weight:600}
    td.code.green{background:var(--c-green)}
    td.code.yellow{background:var(--c-yellow)}
    td.code.red{background:var(--c-red)}
    td.code.orange{background:var(--c-orange)}
    @media (max-width:900px){.codes-wrap{grid-template-columns:1fr}td.code{width:110px}}
  </style>
</head>
