<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TigerPlexPD — Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-box{
      max-width:420px;
      margin:18vh auto;
      padding:22px;
      text-align:center;
    }
    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(0,0,0,.3);
      color:white;
      margin-top:10px;
    }
    button{
      width:100%;
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      border:none;
      background:linear-gradient(135deg,#4f8cff,#7c3aed);
      color:white;
      font-weight:700;
      cursor:pointer;
    }
    .error{color:#ff6b6b;margin-top:10px}
  </style>
</head>
<body>

<div class="card login-box">
  <h2>🔐 TigerPlexPD Access</h2>
  <p>Въведи парола за достъп до сайта</p>

  <input type="password" id="pw" placeholder="Парола">
  <button onclick="login()">Вход</button>

  <div id="err" class="error"></div>
</div>

<script>
  const PASSWORD = "TigerPlexPDS10"; // 🔑 СМЕНИ ТУК

  function login(){
    const val = document.getElementById("pw").value;
    if(val === PASSWORD){
      localStorage.setItem("pd_access","yes");
      window.location.href = "index.html";
    }else{
      document.getElementById("err").innerText = "Грешна парола";
    }
  }
</script>

</body>
</html>
