<body>
  <!-- ✅ Site-wide gate (страница в папка → ../login.html) -->
  <script>
    if (localStorage.getItem("pd_access") !== "yes") {
      window.location.href = "../login.html";
    }
  </script>

  <div class="topbar">
    <div class="wrap nav">
      <div class="brand">
        <div class="logo">TP</div>
        <div>
          <h1>Blaine County Sheriff Office</h1>
          <p>Наръчник за Blaine County Sheriff Office</p>
        </div>
      </div>
      <div class="links">
        <a class="chip" href="../index.html">Начало</a>

      </div>
    </div>

  <main class="wrap">

        <li><a href="unif.html">Униформи</a></li>

      </ul>

      <!-- (по желание) Logout -->
      <div style="height:12px"></div>
      <button class="ctaPrimary" onclick="logout()" type="button">Изход</button>
    </div>

    <footer>© <span id="y"></span> TigerPlexPD</footer>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    function logout(){
      localStorage.removeItem("pd_access");
      window.location.href = "../login.html";

  </script>
