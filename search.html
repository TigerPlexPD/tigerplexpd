<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TigerPlexPD — Търсачка</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ✅ Site-wide gate -->
  <script>
    if (localStorage.getItem("pd_access") !== "yes") {
      window.location.href = "login.html";
    }
  </script>

  <div class="topbar">
    <div class="wrap nav">
      <div class="brand">
        <div class="logo">TP</div>
        <div>
          <h1>TigerPlexPD</h1>
          <p>Police RP Handbook</p>
        </div>
      </div>
   <div class="links">
        <a class="chip" href="handbook/">Handbook</a>
        <a class="chip" href="academy.html">Академия</a>
        <a class="chip" href="codes.html">10-кодове</a>
        <a class="chip" href="lspd/">LSPD</a>
         <a class="chip" href="BCSO/">BCSO</a>
        <a class="chip" href="badges.html">Баджове</a>
        <a class="btn" href="https://discord.gg/CHANGE-ME" target="_blank" rel="noopener">Discord</a>
        <a class="chip" href="search.html">🔎 Търсачка</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <div class="card page">
      <h2>🔎 Търсачка</h2>
      <p>Търси в целия сайт (правила, страници, секции). Пиши поне 2 символа.</p>

      <div class="filterBar" style="margin-top:14px;">
        <input id="q" class="filterInput" type="search" placeholder='Пример: "impound", "10-80", "uniform", "casino"' autocomplete="off">
        <button id="clear" class="filterBtn" type="button">Изчисти</button>
      </div>

      <div class="hr"></div>

      <div id="status" class="searchStatus">Зареждане на индекс…</div>
      <div id="results" class="searchGrid"></div>
    </div>

    <footer>© <span id="y"></span> TigerPlexPD</footer>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    const qEl = document.getElementById("q");
    const clearEl = document.getElementById("clear");
    const resultsEl = document.getElementById("results");
    const statusEl = document.getElementById("status");

    let INDEX = [];

    function normalize(s){
      return String(s || "")
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function scoreItem(item, qNorm){
      // прост скоринг: заглавие > тагове > текст
      const title = normalize(item.title);
      const tags = normalize((item.tags || []).join(" "));
      const text = normalize(item.text || "");

      let score = 0;
      if (title.includes(qNorm)) score += 50;
      if (tags.includes(qNorm)) score += 25;
      if (text.includes(qNorm)) score += 10;

      // бонус, ако започва със
      if (title.startsWith(qNorm)) score += 20;
      if (tags.startsWith(qNorm)) score += 10;

      return score;
    }

    function render(results, qNorm){
      if (!qNorm || qNorm.length < 2){
        statusEl.textContent = "Започни да пишеш…";
        resultsEl.innerHTML = "";
        return;
      }

      if (results.length === 0){
        statusEl.textContent = "Няма резултати.";
        resultsEl.innerHTML = "";
        return;
      }

      statusEl.textContent = `Резултати: ${results.length}`;

      resultsEl.innerHTML = results.map(r => `
        <a class="searchCard" href="${r.url}">
          <div class="searchCardInner">
            <div class="searchTop">
              <div class="searchTitle">${escapeHtml(r.title)}</div>
              <div class="searchBadge">${escapeHtml(r.section || "Page")}</div>
            </div>
            <div class="searchMeta">
              ${(r.tags || []).slice(0,4).map(t => `<span class="searchTag">${escapeHtml(t)}</span>`).join("")}
            </div>
            <div class="searchText">${escapeHtml((r.text || "").slice(0, 160))}${(r.text||"").length>160 ? "…" : ""}</div>
          </div>
        </a>
      `).join("");
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function doSearch(){
      const qNorm = normalize(qEl.value.trim());
      if (qNorm.length < 2){
        render([], qNorm);
        return;
      }

      const scored = INDEX
        .map(item => ({ item, score: scoreItem(item, qNorm) }))
        .filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, 30)
        .map(x => x.item);

      render(scored, qNorm);
    }

    clearEl.addEventListener("click", () => {
      qEl.value = "";
      doSearch();
      qEl.focus();
    });

    qEl.addEventListener("input", doSearch);

    // load index
    (async function(){
      try{
        const res = await fetch("search-index.json?ts=" + Date.now());
        if(!res.ok) throw new Error("HTTP " + res.status);
        INDEX = await res.json();
        if(!Array.isArray(INDEX)) INDEX = [];
        statusEl.textContent = "Започни да пишеш…";
        doSearch();
      }catch(e){
        statusEl.textContent = "Грешка: не може да се зареди search-index.json";
      }
    })();
  </script>
</body>
</html>
